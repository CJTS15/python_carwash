{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto py-10">
    <div class="bg-white dark:bg-slate-900 p-8 rounded-3xl shadow-md border border-slate-100 dark:border-slate-800">
        
        <div class="text-center mb-8">
            <h2 class="text-3xl font-black dark:text-white">Staff Login</h2>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2">Enter your credentials to manage bookings.</p>
        </div>

        <!-- Django Login Form -->
        <form method="POST" class="space-y-6">
            {% csrf_token %}

            {% if form.errors %}
                <div class="p-4 rounded-xl bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 text-red-700 dark:text-red-400 text-sm">
                    Your username and password didn't match. Please try again.
                </div>
            {% endif %}

            <div>
                <label for="id_username" class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Username</label>
                <input type="text" name="username" id="id_username" required autofocus
                    class="w-full p-4 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 dark:text-white outline-none focus:ring-2 focus:ring-blue-500 transition">
            </div>

            <div>
                <label for="id_password" class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Password</label>
                <input type="password" name="password" id="id_password" required
                    class="w-full p-4 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 dark:text-white outline-none focus:ring-2 focus:ring-blue-500 transition">
            </div>

            <button type="submit" 
                class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl hover:bg-blue-700 shadow-lg shadow-blue-200 dark:shadow-none transition-all active:scale-95">
                Sign In
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-slate-100 dark:border-slate-800 text-center">
            <a href="{% url 'index' %}" class="text-sm text-slate-400 hover:text-blue-600 transition font-medium">
                ← Back to Homepage
            </a>
        </div>
    </div>
</div>
{% endblock %}
