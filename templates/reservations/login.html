<!-- templates/registration/login.html -->
{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto bg-white dark:bg-slate-900 p-8 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-800">
    <h2 class="text-2xl font-bold mb-6 dark:text-white">Login to Velez Carwash</h2>
    
    <form method="post" class="space-y-4">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-medium mb-1 dark:text-slate-300">Username</label>
            <input type="text" name="username" class="w-full p-3 rounded-xl border dark:border-slate-700 dark:bg-slate-800 dark:text-white">
        </div>
        <div>
            <label class="block text-sm font-medium mb-1 dark:text-slate-300">Password</label>
            <input type="password" name="password" class="w-full p-3 rounded-xl border dark:border-slate-700 dark:bg-slate-800 dark:text-white">
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition">
            Sign In
        </button>
    </form>
</div>
{% endblock %}
